<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Чарт недели — Rouman</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
  html, body { overflow-x: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #0B0B0D);
    color: var(--tg-theme-text-color, #F5F5F0);
    padding: 16px 14px 100px;
    min-height: 100vh;
    position: relative;
  }

  .orb {
    position: fixed; border-radius: 50%; filter: blur(60px);
    opacity: 0.24; pointer-events: none; z-index: 0;
    animation: float 14s ease-in-out infinite;
  }
  .orb1 { width: 220px; height: 220px; background: #1DB954; top: -60px; left: -60px; animation-delay: 0s; }
  .orb2 { width: 180px; height: 180px; background: #FFCC02; bottom: 10%; right: -60px; animation-delay: -5s; }
  .orb3 { width: 160px; height: 160px; background: #0077FF; bottom: -80px; left: 20%; animation-delay: -9s; }
  @keyframes float {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(20px,-24px) scale(1.12); }
  }

  .header-banner {
    display: block; width: calc(100% + 28px);
    margin: -16px -14px 18px;
  }

  .tabs {
    display: flex; gap: 6px; margin-top: 16px; position: relative; z-index: 1;
    background: var(--tg-theme-secondary-bg-color, #141416);
    padding: 4px; border-radius: 12px;
    overflow-x: auto;
  }
  .tab {
    flex: 1; text-align: center; padding: 10px 4px; border: none;
    background: transparent; color: var(--tg-theme-hint-color, #8A8A8F);
    font-size: 11px; font-weight: 700; border-radius: 9px; cursor: pointer;
    transition: background 0.25s ease, color 0.25s ease;
    white-space: nowrap;
  }
  .tab.active { background: #1DB954; color: #06210F; }

  .rule {
    margin-top: 14px; height: 2px; width: 0;
    background: linear-gradient(90deg, #1DB954, #FFCC02, #0077FF);
    animation: grow 0.8s cubic-bezier(.22,1,.36,1) 0.25s forwards;
  }
  @keyframes grow { to { width: 100%; } }

  .week { display: none; }
  .week.active { display: block; }

  .card {
    background: var(--tg-theme-secondary-bg-color, #141416);
    border-radius: 16px; padding: 10px; margin-bottom: 12px; margin-top: 14px;
    position: relative; z-index: 1;
    opacity: 0; transform: translateY(16px) scale(0.97);
    animation: cardIn 0.55s cubic-bezier(.22,1.2,.36,1) forwards;
    border: 1.5px solid transparent;
    transition: border-color 0.3s ease, transform 0.15s ease;
  }
  .card:active { transform: scale(0.985); }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0) scale(1); } }
  .card.playing {
    border-color: #1DB954;
    animation: cardIn 0.55s cubic-bezier(.22,1.2,.36,1) forwards, pulseGlow 2.2s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 1px #1DB95440, 0 4px 16px #1DB95422; }
    50% { box-shadow: 0 0 0 1px #1DB95470, 0 4px 26px #1DB95448; }
  }

  .num {
    display: inline-block;
    background: #000; color:#fff;
    font-size: 11px; font-weight:800; padding: 3px 8px; border-radius: 8px;
    margin-bottom: 8px;
    transition: background 0.3s ease, transform 0.3s ease;
  }
  .card.playing .num { background: #1DB954; color: #06210F; animation: numPulse 2.2s ease-in-out infinite; }
  @keyframes numPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

  .player-wrap { margin-bottom: 8px; }
  .embed-slot {
    border-radius: 12px; min-height: 152px; overflow: hidden;
    background: linear-gradient(100deg, #1c1c1f 30%, #26262a 50%, #1c1c1f 70%);
    background-size: 200% 100%;
    animation: shimmer 1.6s ease-in-out infinite;
  }
  .embed-slot:has(iframe) { animation: none; background: none; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .fallback {
    width: 100%; margin-top: 6px;
    border: none; cursor: pointer; border-radius: 9px;
    background: #1DB95418; color: #1DB954;
    font-size: 12px; font-weight: 700; padding: 8px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  .links { display:flex; gap:6px; flex-wrap: wrap; }
  .pill {
    border:none; font-size: 11px; font-weight: 700;
    padding: 7px 11px; border-radius: 9px; cursor:pointer;
    transform: scale(1); transition: transform 0.12s ease, filter 0.12s ease;
  }
  .pill:active { transform: scale(0.9); filter: brightness(1.3); }
  .ym { background: #FFCC0222; color:#FFCC02; }
  .vk { background: #0077FF22; color:#4C9DFF; }

  .footer {
    text-align:center; padding-top: 18px; position: relative; z-index: 1;
    color: var(--tg-theme-hint-color, #6A6A70); font-size: 12px;
  }
</style>
</head>

<script>
  const tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('secondary_bg_color');
  }
  function tap(url) {
    if (tg && tg.HapticFeedback) { tg.HapticFeedback.impactOccurred('light'); }
    if (tg && tg.openLink) { tg.openLink(url); }
    else { window.open(url, '_blank'); }
  }
  function replayCards(weekId) {
    const cards = document.querySelectorAll('#' + weekId + ' .card');
    cards.forEach((c, i) => {
      c.style.animation = 'none';
      void c.offsetWidth; // форсируем reflow, чтобы анимация перезапустилась
      c.style.animationDelay = (80 + i * 60) + 'ms';
      c.style.animation = c.classList.contains('playing')
        ? 'cardIn 0.5s cubic-bezier(.22,1.2,.36,1) forwards, pulseGlow 2.2s ease-in-out infinite'
        : 'cardIn 0.5s cubic-bezier(.22,1.2,.36,1) forwards';
    });
  }
  function showWeek(which) {
    if (tg && tg.HapticFeedback) { tg.HapticFeedback.selectionChanged(); }
    ['d','a','b','c'].forEach(w => {
      document.getElementById('week' + w.toUpperCase()).classList.toggle('active', which === w);
      document.getElementById('tab' + w.toUpperCase()).classList.toggle('active', which === w);
    });
    replayCards('week' + which.toUpperCase());
  }

  // --- Spotify IFrame API ---
  const groups = {};
  let activeController = null;
  let activePid = null;

  window.onSpotifyIframeApiReady = (IFrameAPI) => {
    document.querySelectorAll('.embed-slot').forEach((el) => {
      const uri = el.getAttribute('data-uri');
      const order = el.getAttribute('data-order');
      const idx = parseInt(el.getAttribute('data-idx'), 10);
      const pid = order + idx;
      const options = { uri: uri, width: '100%', height: '152' };

      IFrameAPI.createController(el, options, (controller) => {
        if (!groups[order]) groups[order] = [];
        groups[order][idx] = controller;

        controller.addListener('playback_update', (e) => {
          const card = document.getElementById('card-' + pid);
          const playing = !e.data.isPaused;

          if (playing) {
            if (activeController && activeController !== controller) {
              activeController.pause();
              const prevCard = document.getElementById('card-' + activePid);
              if (prevCard) prevCard.classList.remove('playing');
            }
            activeController = controller;
            activePid = pid;
            if (card) card.classList.add('playing');
          } else if (card && activePid === pid) {
            card.classList.remove('playing');
          }

          if (playing && e.data.duration > 0 && e.data.position >= e.data.duration - 800) {
            const list = groups[order];
            const next = list[idx + 1];
            if (next) {
              controller.pause();
              setTimeout(() => next.play(), 300);
            }
          }
        });
      });
    });
  };
</script>
