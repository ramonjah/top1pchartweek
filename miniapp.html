  .orb1 { width: 220px; height: 220px; background: #1DB954; top: -60px; left: -60px; animation-delay: 0s; }

  .orb3 { width: 160px; height: 160px; background: #0077FF; bottom: -80px; left: 20%; animation-delay: -9s; }
  @keyframes float {
    0%, 100% { transform: translate(0,0) scale(1); }

  .header { padding: 8px 4px 18px; position: relative; z-index: 1; }
  .eq { display:inline-flex; gap:3px; align-items:flex-end; height:16px; margin-right:8px; vertical-align:middle; }

  .eq span:nth-child(1) { height:6px; animation-delay:0s; }
  .eq span:nth-child(2) { height:14px; animation-delay:0.15s; }
  .eq span:nth-child(3) { height:9px; animation-delay:0.3s; }
  @keyframes eq { 0%,100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }

  .header h1 { font-size: 26px; font-weight: 800; opacity: 0; animation: fadeIn 0.5s ease 0.05s forwards; }
  .header h1 span { color: #1DB954; }
  .header p {
    margin-top: 6px; font-size: 13px;
    color: var(--tg-theme-hint-color, #8A8A8F);
    text-transform: uppercase; letter-spacing: 0.5px;
    opacity: 0; animation: fadeIn 0.5s ease 0.15s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  .tabs {
    display: flex; gap: 6px; margin-top: 16px; position: relative; z-index: 1;
    background: var(--tg-theme-secondary-bg-color, #141416);
    padding: 4px; border-radius: 12px;
  }
  .tab {
    flex: 1; text-align: center; padding: 10px 4px; border: none;
    background: transparent; color: var(--tg-theme-hint-color, #8A8A8F);
    font-size: 12px; font-weight: 700; border-radius: 9px; cursor: pointer;
    transition: background 0.25s ease, color 0.25s ease;
  }
  .tab.active { background: #1DB954; color: #06210F; }

  .rule {
    margin-top: 14px; height: 2px; width: 0;
    background: linear-gradient(90deg, #1DB954, #FFCC02, #0077FF);
    animation: grow 0.8s cubic-bezier(.22,1,.36,1) 0.25s forwards;
  }
  @keyframes grow { to { width: 100%; } }

  .week { display: none; }
  .week.active { display: block; }

  .card {
    background: var(--tg-theme-secondary-bg-color, #141416);
    border-radius: 16px; padding: 10px; margin-bottom: 12px; margin-top: 14px;
    position: relative; z-index: 1;
    opacity: 0; transform: translateY(16px) scale(0.97);
    animation: cardIn 0.55s cubic-bezier(.22,1.2,.36,1) forwards;
    border: 1.5px solid transparent;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0) scale(1); } }
  .card.playing {
    border-color: #1DB954;
    box-shadow: 0 0 0 1px #1DB95440, 0 4px 16px #1DB95422;
  }

  .num {
    display: inline-block;
    background: #000; color:#fff;
    font-size: 11px; font-weight:800; padding: 3px 8px; border-radius: 8px;
    margin-bottom: 8px;
  }
  .card.playing .num { background: #1DB954; color: #06210F; }

  .player-wrap { margin-bottom: 8px; }
  .embed-slot { border-radius: 12px; min-height: 152px; overflow: hidden; }
  .fallback {
    width: 100%; margin-top: 6px;
    border: none; cursor: pointer; border-radius: 9px;
    background: #1DB95418; color: #1DB954;
    font-size: 12px; font-weight: 700; padding: 8px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  .links { display:flex; gap:6px; flex-wrap: wrap; }
  .pill {
    border:none; font-size: 11px; font-weight: 700;
    padding: 7px 11px; border-radius: 9px; cursor:pointer;
    transform: scale(1); transition: transform 0.12s ease, filter 0.12s ease;
  }
  .pill:active { transform: scale(0.9); filter: brightness(1.3); }
  .ym { background: #FFCC0222; color:#FFCC02; }
  .vk { background: #0077FF22; color:#4C9DFF; }

  .footer {
    text-align:center; padding-top: 18px; position: relative; z-index: 1;
    color: var(--tg-theme-hint-color, #6A6A70); font-size: 12px;
  }
</style>

<script>
  const tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('secondary_bg_color');
  }
  function tap(url) {
    if (tg && tg.HapticFeedback) { tg.HapticFeedback.impactOccurred('light'); }
    if (tg && tg.openLink) { tg.openLink(url); }
    else { window.open(url, '_blank'); }
  }
  function showWeek(which) {
    if (tg && tg.HapticFeedback) { tg.HapticFeedback.selectionChanged(); }
    document.getElementById('weekA').classList.toggle('active', which === 'a');
    document.getElementById('weekB').classList.toggle('active', which === 'b');
    document.getElementById('weekC').classList.toggle('active', which === 'c');
    document.getElementById('tabA').classList.toggle('active', which === 'a');
    document.getElementById('tabB').classList.toggle('active', which === 'b');
    document.getElementById('tabC').classList.toggle('active', which === 'c');
  }

  // --- Spotify IFrame API ---
  // controllers сгруппированы по неделе (order), чтобы автопереход шёл в рамках своего чарта
  const groups = {};   // { a: [controller0, controller1, ...], b: [...], c: [...] }
  let activeController = null;
  let activePid = null;

  window.onSpotifyIframeApiReady = (IFrameAPI) => {
    document.querySelectorAll('.embed-slot').forEach((el) => {
      const uri = el.getAttribute('data-uri');
      const order = el.getAttribute('data-order');
      const idx = parseInt(el.getAttribute('data-idx'), 10);
      const pid = order + idx;
      const options = { uri: uri, width: '100%', height: '152' };

      IFrameAPI.createController(el, options, (controller) => {
        if (!groups[order]) groups[order] = [];
        groups[order][idx] = controller;

        controller.addListener('playback_update', (e) => {
          const card = document.getElementById('card-' + pid);
          const playing = !e.data.isPaused;

          if (playing) {
            // остановить предыдущий играющий плеер
            if (activeController && activeController !== controller) {
              activeController.pause();
              const prevCard = document.getElementById('card-' + activePid);
              if (prevCard) prevCard.classList.remove('playing');
            }
            activeController = controller;
            activePid = pid;
            if (card) card.classList.add('playing');
          } else if (card && activePid === pid) {
            card.classList.remove('playing');
          }

          // автопереход на следующий трек чарта, когда текущий доигран
          if (playing && e.data.duration > 0 && e.data.position >= e.data.duration - 800) {
            const list = groups[order];
            const next = list[idx + 1];
            if (next) {
              controller.pause();
              setTimeout(() => next.play(), 300);
            }
          }
        });
      });
    });
  };
</script>
